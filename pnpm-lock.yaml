lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .: {}

  packages/opencode-bridge:
    dependencies:
      '@opencode-extension-stack/opencode-core':
        specifier: workspace:*
        version: link:../opencode-core
      '@opencode-extension-stack/opencode-packs':
        specifier: workspace:*
        version: link:../opencode-packs

  packages/opencode-core: {}

  packages/opencode-kairos:
    dependencies:
      '@opencode-extension-stack/opencode-core':
        specifier: workspace:*
        version: link:../opencode-core

  packages/opencode-memory:
    dependencies:
      '@opencode-extension-stack/opencode-core':
        specifier: workspace:*
        version: link:../opencode-core

  packages/opencode-orchestrator:
    dependencies:
      '@opencode-extension-stack/opencode-core':
        specifier: workspace:*
        version: link:../opencode-core
      '@opencode-extension-stack/opencode-memory':
        specifier: workspace:*
        version: link:../opencode-memory

  packages/opencode-packs:
    dependencies:
      '@opencode-extension-stack/opencode-core':
        specifier: workspace:*
        version: link:../opencode-core
